name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:workspace-types
      - run: pnpm run build:workspace:ci
      - run: pnpm run lint:workspace:ci
      - run: pnpm run test:workspace:ci
      - run: pnpm lint:deadcode
      - run: pnpm pack:check-integrity

  consumer-smoke-pack:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:workspace:ci
      - run: pnpm consumer-smoke:pack

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:e2e:smoke:ci

  performance-regression:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [quality, consumer-smoke-pack, e2e-smoke]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run perf:regression:ci
